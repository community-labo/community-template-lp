<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>お問い合わせ | 〇〇サロン</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap">
<style>
:root{--blue:#1E88E5;--blue-deep:#1565C0;--blue-soft:#E3F2FD;--blue-soft-2:#F7FBFF;--navy:#0D2B45;--ink:#1F2937;--ink-2:#374151;--muted:#6B7280;--line:#E5E7EB;--max-w:1000px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"Noto Sans JP",system-ui,sans-serif;color:var(--ink);background:#fff;min-height:100vh;line-height:1.75;-webkit-font-smoothing:antialiased}
a{color:inherit}
.lp-wrap{width:100%;min-height:100vh;background:#fff}
.page-header{background:linear-gradient(180deg,#F7FBFF 0%,#E3F2FD 100%);padding:112px 24px 72px;text-align:center;border-bottom:1px solid rgba(30,136,229,.12)}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:13px;font-weight:700;text-decoration:none;margin-bottom:24px}
.back-link:hover{color:var(--blue-deep)}
h1{font-size:clamp(30px,4vw,48px);font-weight:900;color:var(--navy);line-height:1.25}
.page-header p{font-size:13px;color:var(--blue);margin-top:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.content{width:100%;max-width:var(--max-w);margin:0 auto;padding:72px 24px 96px}
.lead{font-size:16px;color:var(--ink-2);line-height:2;font-weight:500;margin:0 auto 32px;max-width:720px;text-align:center}
.contact-card{background:#fff;border:1px solid rgba(30,136,229,.16);border-radius:8px;padding:32px;box-shadow:0 8px 32px rgba(30,136,229,.08);max-width:720px;margin:0 auto}
.contact-label{font-size:13px;font-weight:900;color:var(--blue);margin-bottom:12px;letter-spacing:.08em}
.mail-link{display:block;background:var(--blue);color:#fff;text-align:center;text-decoration:none;font-size:18px;font-weight:900;padding:18px 24px;border-radius:8px;box-shadow:0 6px 20px rgba(30,136,229,.3);word-break:break-all}
.mail-link:hover{background:var(--blue-deep)}
.note{font-size:13px;color:var(--muted);line-height:1.9;margin-top:18px}
.page-footer{background:var(--navy);padding:40px 24px;text-align:center}
.page-footer a{color:rgba(255,255,255,.72);font-size:13px;font-weight:500;text-decoration:none;margin:0 12px}
.page-footer a:hover{color:#fff}
.page-footer p{font-size:12px;color:rgba(255,255,255,.35);margin-top:18px}
@media (max-width: 640px){.page-header{padding:88px 20px 56px}.content{padding:48px 20px 72px}.contact-card{padding:24px}.page-footer a{display:inline-block;margin:6px 10px}}
</style>
</head>
<body>
<div class="lp-wrap">
  <header class="page-header">
    <a href="index.html" class="back-link">トップに戻る</a>
    <h1>お問い合わせ</h1>
    <p>Contact</p>
  </header>
  <main class="content">
    <p class="lead">サービス、掲載内容、各種お手続きに関するお問い合わせは、以下のメールアドレスまでご連絡ください。</p>
    <div class="contact-card">
      <p class="contact-label">お問い合わせ先</p>
      <a class="mail-link" href="mailto:info@example.com">info@example.com</a>
      <p class="note">通常3営業日以内に返信いたします。内容により、回答までお時間をいただく場合があります。</p>
    </div>
  </main>
  <footer class="page-footer">
    <a href="index.html">トップ</a>
    <a href="tokushoho.html">特定商取引法</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="terms.html">利用規約</a>
    <p>© 2026 Community All Rights Reserved.</p>
  </footer>
</div>
</body>
</html>
